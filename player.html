<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <title>My Spotify Player</title>
    <link rel="stylesheet" href="styling.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ── Player page overrides ─────────────────────────────── */
      body {
        align-items: center;
        justify-content: center;
      }

      .player-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 36px 32px;
        width: min(420px, 92vw);
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .player-container h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #track-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      #album-art {
        width: 180px;
        height: 180px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        background: rgba(255, 255, 255, 0.05);
      }

      #track-name {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        color: var(--cream);
        letter-spacing: 0.3px;
      }

      #artist-name {
        margin: 0;
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      /* Progress bar */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .progress-row span {
        font-size: 11px;
        color: var(--text-muted);
        min-width: 34px;
        font-family: "Share Tech Mono", monospace;
      }

      #progress-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      /* Controls */
      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .controls button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--glass-border);
        background: transparent;
        color: var(--text-primary);
        border-radius: 50%;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition),
          transform var(--transition);
        padding: 0;
      }

      .controls button:hover {
        background: var(--glass-hover);
        color: var(--cream);
        border-color: var(--brown-light);
        transform: scale(1.1);
      }

      /* Prev / Next */
      .controls .btn-skip {
        width: 42px;
        height: 42px;
        font-size: 18px;
      }

      /* Play/Pause — larger */
      #play-btn {
        width: 56px;
        height: 56px;
        font-size: 24px;
        background: var(--brown-mid) !important;
        border-color: var(--brown-light) !important;
        color: var(--cream) !important;
        box-shadow: 0 4px 14px rgba(129, 50, 11, 0.4);
      }

      #play-btn:hover {
        background: var(--brown-light) !important;
        transform: scale(1.08) !important;
      }

      /* Volume row */
      .volume-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .volume-row .bi {
        font-size: 16px;
        color: var(--text-muted);
      }

      #volume-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      /* Back link */
      .back-link {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: color var(--transition);
      }

      .back-link:hover {
        color: var(--cream);
      }

      /* ── App layout ─────────────────────────────────────── */
      .app-layout {
        display: grid;
        grid-template-columns: 220px 1fr 320px;
        gap: 16px;
        width: 100%;
        max-width: 1280px;
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        overflow: hidden;
      }

      /* ── Sidebar ────────────────────────────────────────── */
      .sidebar {
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .sidebar h3 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #playlist-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #playlist-list li {
        padding: 9px 12px;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        cursor: pointer;
        transition: background var(--transition), color var(--transition);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #playlist-list li:hover,
      #playlist-list li.active {
        background: var(--glass-hover);
        color: var(--cream);
      }

      /* ── Main content ───────────────────────────────────── */
      .main-content {
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      .search-bar {
        display: flex;
        gap: 8px;
      }

      #search-input {
        flex: 1;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-pill);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        padding: 10px 18px;
        outline: none;
        transition: border-color var(--transition);
      }

      #search-input::placeholder {
        color: var(--text-muted);
      }

      #search-input:focus {
        border-color: var(--brown-light);
      }

      .search-bar button {
        padding: 10px 20px;
        border-radius: var(--radius-pill);
        border: 1.5px solid var(--brown-light);
        background: var(--brown-mid);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background var(--transition), transform var(--transition);
        white-space: nowrap;
      }

      .search-bar button:hover {
        background: var(--brown-light);
        transform: translateY(-1px);
      }

      .tracklist-panel {
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 18px 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #playlist-title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #track-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #track-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 12px;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        cursor: pointer;
        transition: background var(--transition), color var(--transition);
        gap: 10px;
      }

      #track-list li:hover {
        background: var(--glass-hover);
        color: var(--cream);
      }

      #track-list li .track-meta {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        overflow: hidden;
      }

      #track-list li .track-title {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #track-list li .track-artist {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #track-list li .add-queue-btn {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
        flex-shrink: 0;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
      }

      #track-list li .add-queue-btn:hover {
        background: var(--brown-mid);
        border-color: var(--brown-light);
        color: var(--cream);
      }

      /* ── Right panel ────────────────────────────────────── */
      .right-panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      .player-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 24px 20px 18px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        text-align: center;
        flex-shrink: 0;
      }

      .player-container h2 {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #album-art {
        width: 140px;
        height: 140px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        background: rgba(255, 255, 255, 0.05);
      }

      #track-name {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--cream);
      }

      #artist-name {
        margin: 0;
        font-size: 12px;
        color: var(--text-muted);
      }

      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .progress-row span {
        font-size: 10px;
        color: var(--text-muted);
        min-width: 30px;
        font-family: "Share Tech Mono", monospace;
      }

      #progress-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .controls button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--glass-border);
        background: transparent;
        color: var(--text-primary);
        border-radius: 50%;
        cursor: pointer;
        padding: 0;
        transition: background var(--transition), color var(--transition), transform var(--transition);
      }

      .controls button:hover {
        background: var(--glass-hover);
        color: var(--cream);
        border-color: var(--brown-light);
        transform: scale(1.1);
      }

      .controls .btn-skip { width: 38px; height: 38px; font-size: 17px; }

      #play-btn {
        width: 50px;
        height: 50px;
        font-size: 22px;
        background: var(--brown-mid) !important;
        border-color: var(--brown-light) !important;
        color: var(--cream) !important;
        box-shadow: 0 4px 14px rgba(129, 50, 11, 0.4);
      }

      #play-btn:hover {
        background: var(--brown-light) !important;
        transform: scale(1.08) !important;
      }

      .volume-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .volume-row .bi { font-size: 14px; color: var(--text-muted); }

      #volume-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      .player-links {
        display: flex;
        gap: 16px;
      }

      .back-link,
      .logout-link {
        font-size: 11px;
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: color var(--transition);
      }

      .back-link:hover,
      .logout-link:hover { color: var(--cream); }

      /* ── Queue panel ────────────────────────────────────── */
      .queue-panel {
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
      }

      .queue-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .queue-header h3 {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .clear-btn {
        padding: 5px 14px;
        border-radius: var(--radius-pill);
        border: 1px solid var(--glass-border);
        background: transparent;
        color: var(--text-muted);
        font-family: "Inter", sans-serif;
        font-size: 11px;
        cursor: pointer;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
      }

      .clear-btn:hover {
        background: var(--glass-hover);
        color: var(--cream);
        border-color: var(--brown-light);
      }

      #queue-list {
        list-style: none;
        padding: 0;
        margin: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }

      #queue-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 12px;
        gap: 8px;
        transition: background var(--transition);
      }

      #queue-list li:hover { background: var(--glass-hover); }

      #queue-list li .q-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #queue-list li .remove-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 14px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: color var(--transition);
        flex-shrink: 0;
      }

      #queue-list li .remove-btn:hover { color: var(--cream); }

      /* ── Responsive ─────────────────────────────────────── */
      @media (max-width: 1024px) {
        .app-layout {
          grid-template-columns: 180px 1fr 280px;
        }
      }

      @media (max-width: 768px) {
        .app-layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr auto;
          height: auto;
          overflow: visible;
          padding: 12px;
        }

        .sidebar { max-height: 180px; }
        .right-panel { flex-direction: column; }
        #album-art { width: 110px; height: 110px; }
      }
    </link>
  </head>
  <body>
    <div class="app-layout">

      <!-- Sidebar: playlists -->
      <div class="sidebar">
        <h3>Your Playlists</h3>
        <ul id="playlist-list"></ul>
      </div>

      <!-- Main content: search + tracklist -->
      <div class="main-content">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Search for songs…"
            onkeydown="if(event.key==='Enter') searchSongs()" />
          <button onclick="searchSongs()">
            <i class="bi bi-search"></i> Search
          </button>
        </div>

        <div class="tracklist-panel">
          <h3 id="playlist-title">Select a Playlist</h3>
          <ul id="track-list"></ul>
        </div>
      </div>

      <!-- Right panel: player + queue -->
      <div class="right-panel">

        <!-- Player -->
        <div class="player-container">
          <h2>Now Playing</h2>
          <img id="album-art" src="" alt="Album Art" />
          <p id="track-name">Nothing playing</p>
          <p id="artist-name"></p>

          <div class="progress-row">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100" />
            <span id="total-time">0:00</span>
          </div>

          <div class="controls">
            <button class="btn-skip" onclick="previousTrack()" aria-label="Previous">
              <i class="bi bi-skip-start-fill"></i>
            </button>
            <button id="play-btn" onclick="togglePlay()" aria-label="Play / Pause">
              <i class="bi bi-play-fill" id="play-icon"></i>
            </button>
            <button class="btn-skip" onclick="nextTrack()" aria-label="Next">
              <i class="bi bi-skip-end-fill"></i>
            </button>
          </div>

          <div class="volume-row">
            <i class="bi bi-volume-down"></i>
            <input type="range" id="volume-bar" value="100" min="0" max="100" />
            <i class="bi bi-volume-up"></i>
          </div>

          <div class="player-links">
            <a href="index.php" class="back-link">
              <i class="bi bi-arrow-left"></i> Home
            </a>
            <a href="logout.php" class="logout-link">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </div>
        </div>

        <!-- Queue -->
        <div class="queue-panel">
          <div class="queue-header">
            <h3>Queue <span id="queue-count">(0)</span></h3>
            <button class="clear-btn" onclick="clearQueue()">Clear</button>
          </div>
          <ul id="queue-list"></ul>
        </div>

      </div>
    </div>

    <!-- Spotify Web Playback SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="player.js"></script>
  </body>
</html>
