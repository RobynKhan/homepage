<!--
  ============================================================================
  player.html — Standalone Music Player (Spotify + YouTube)
  ============================================================================

  A standalone three-column music player page with dual-API support:
    - Left sidebar:   User's Spotify playlists
    - Center content: Search bar + track list results
    - Right panel:    Tab-switchable Spotify (IFrame Embed) and YouTube
                      players running in independent iframes

  Both players operate independently — switching between tabs does NOT
  stop either player. Each API runs in its own iframe with separate state.

  Dependencies: styling.css, player.js, youtube.js,
                Spotify IFrame Embed API (loaded by player.js)
  ============================================================================
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <title>Music Player — PixelTune</title>
    <link rel="stylesheet" href="styling.css" />
    <style>
      /* ── Standalone Player Page: Body Layout Override ───────────── */
      body {
        align-items: center;
        justify-content: center;
      }

      /* ── Three-Column Application Layout Grid ── */
      .app-layout {
        display: grid;
        grid-template-columns: 220px 1fr 360px;
        gap: 16px;
        width: 100%;
        max-width: 1320px;
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        overflow: hidden;
      }

      /* ── Left Sidebar: Playlist Navigation ── */
      .sidebar {
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .sidebar h3 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #playlist-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #playlist-list li {
        padding: 9px 12px;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #playlist-list li:hover,
      #playlist-list li.active {
        background: var(--glass-hover);
        color: var(--cream);
      }

      /* ── Center Panel: Search + Track List Display ── */
      .main-content {
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      .search-bar {
        display: flex;
        gap: 8px;
      }

      #search-input {
        flex: 1;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-pill);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        padding: 10px 18px;
        outline: none;
        transition: border-color var(--transition);
      }

      #search-input::placeholder {
        color: var(--text-muted);
      }

      #search-input:focus {
        border-color: var(--brown-light);
      }

      .search-bar button {
        padding: 10px 20px;
        border-radius: var(--radius-pill);
        border: 1.5px solid var(--brown-light);
        background: var(--brown-mid);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition);
        white-space: nowrap;
      }

      .search-bar button:hover {
        background: var(--brown-light);
        transform: translateY(-1px);
      }

      .tracklist-panel {
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 18px 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #playlist-title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #track-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #track-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 12px;
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition);
        gap: 10px;
      }

      #track-list li:hover {
        background: var(--glass-hover);
        color: var(--cream);
      }

      #track-list li .track-meta {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        overflow: hidden;
      }

      #track-list li .track-title {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #track-list li .track-artist {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #track-list li .add-queue-btn {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-muted);
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background var(--transition),
          color var(--transition),
          border-color var(--transition);
      }

      #track-list li .add-queue-btn:hover {
        background: var(--brown-mid);
        border-color: var(--brown-light);
        color: var(--cream);
      }

      /* ── Right Panel: Tabbed Music Players ── */
      .right-panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      /* Tab Bar: Spotify / YouTube Switch */
      .player-tab-bar {
        display: flex;
        gap: 4px;
        background: var(--glass-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 6px;
      }

      .player-tab {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text-muted);
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition);
      }

      .player-tab:hover {
        color: var(--cream);
        background: var(--glass-hover);
      }

      .player-tab.active {
        background: var(--brown-mid);
        color: var(--cream);
        border: 1px solid var(--brown-light);
        box-shadow: 0 2px 8px rgba(129, 50, 11, 0.3);
      }

      /* Player Panels (Spotify / YouTube) */
      .player-panel {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .player-panel.active {
        display: flex;
      }

      /* Spotify Embed Container */
      .spotify-player-card {
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      .spotify-player-card h3 {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #spotify-embed-container {
        flex: 1;
        min-height: 300px;
        border-radius: 8px;
        overflow: hidden;
      }

      /* YouTube Player Card */
      .youtube-player-card {
        flex: 1;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      .youtube-player-card h3 {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .yt-url-bar {
        display: flex;
        gap: 6px;
      }

      .yt-url-bar input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-pill);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        padding: 8px 14px;
        outline: none;
        transition: border-color var(--transition);
      }

      .yt-url-bar input::placeholder {
        color: var(--text-muted);
      }

      .yt-url-bar input:focus {
        border-color: #ff0000;
      }

      .yt-url-bar input.error {
        border-color: #e74c3c;
      }

      .yt-url-bar button {
        padding: 8px 16px;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(255, 0, 0, 0.4);
        background: rgba(255, 0, 0, 0.15);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition);
        white-space: nowrap;
      }

      .yt-url-bar button:hover {
        background: rgba(255, 0, 0, 0.3);
        transform: translateY(-1px);
      }

      .yt-error-msg {
        font-size: 11px;
        color: #e74c3c;
        display: none;
        letter-spacing: 0.5px;
      }

      .yt-error-msg.visible {
        display: block;
      }

      .yt-embed-wrap {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        flex: 1;
        min-height: 240px;
      }

      .yt-embed-wrap iframe {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 240px;
        border: 0;
      }

      .yt-loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
      }

      .yt-loading-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .yt-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .yt-play-btn {
        padding: 8px 18px;
        border-radius: var(--radius-pill);
        border: 1px solid rgba(255, 0, 0, 0.4);
        background: rgba(255, 0, 0, 0.15);
        color: var(--cream);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background var(--transition),
          transform var(--transition);
      }

      .yt-play-btn:hover {
        background: rgba(255, 0, 0, 0.3);
        transform: translateY(-1px);
      }

      .yt-volume {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1;
      }

      .yt-volume span {
        font-size: 16px;
        cursor: default;
      }

      .yt-volume input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: #ff4444;
      }

      /* Navigation Links */
      .player-links {
        display: flex;
        gap: 16px;
        padding: 6px 0 0;
      }

      .back-link,
      .logout-link {
        font-size: 11px;
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: color var(--transition);
      }

      .back-link:hover,
      .logout-link:hover {
        color: var(--cream);
      }

      /* ── Responsive Layout: Tablet + Mobile Breakpoints ── */
      @media (max-width: 1024px) {
        .app-layout {
          grid-template-columns: 180px 1fr 300px;
        }
      }

      @media (max-width: 768px) {
        .app-layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr auto;
          height: auto;
          overflow: visible;
          padding: 12px;
        }

        .sidebar {
          max-height: 180px;
        }

        .right-panel {
          flex-direction: column;
        }

        #spotify-embed-container {
          min-height: 200px;
        }

        .yt-embed-wrap {
          min-height: 180px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <!-- ====== LEFT SIDEBAR: Playlist Navigation ====== -->
      <div class="sidebar">
        <h3>Your Playlists</h3>
        <ul id="playlist-list"></ul>
      </div>

      <!-- ====== CENTER CONTENT: Song Search + Track List ====== -->
      <div class="main-content">
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            placeholder="Search for songs…"
            onkeydown="if (event.key === 'Enter') searchSongs();"
          />
          <button onclick="searchSongs()">
            <i class="bi bi-search"></i> Search
          </button>
        </div>

        <div class="tracklist-panel">
          <h3 id="playlist-title">Select a Playlist</h3>
          <ul id="track-list"></ul>
        </div>
      </div>

      <!-- ====== RIGHT PANEL: Tabbed Music Players (Spotify + YouTube) ====== -->
      <div class="right-panel">
        <!-- Tab Bar: Switch between Spotify and YouTube -->
        <div class="player-tab-bar">
          <button
            class="player-tab active"
            id="sp-tab-spotify"
            onclick="switchPlayerTab('spotify')"
          >
            <i class="bi bi-spotify"></i> Spotify
          </button>
          <button
            class="player-tab"
            id="sp-tab-youtube"
            onclick="switchPlayerTab('youtube')"
          >
            <i class="bi bi-youtube"></i> YouTube
          </button>
        </div>

        <!-- Spotify Player Panel (IFrame Embed API) -->
        <div class="player-panel active" id="sp-panel-spotify">
          <div class="spotify-player-card">
            <h3><i class="bi bi-spotify"></i> Now Playing</h3>
            <div id="spotify-embed-container">
              <!-- Spotify IFrame Embed API renders here -->
            </div>
          </div>
        </div>

        <!-- YouTube Player Panel (Independent iframe) -->
        <div class="player-panel" id="sp-panel-youtube">
          <div class="youtube-player-card">
            <h3><i class="bi bi-youtube"></i> YouTube</h3>

            <!-- YouTube URL Input -->
            <div class="yt-url-bar">
              <input
                type="text"
                id="lofi-url-input"
                placeholder="Paste YouTube URL…"
                onkeydown="if (event.key === 'Enter') loadLofiURL();"
              />
              <button onclick="loadLofiURL()">Go</button>
              <button onclick="resetLofiDefault()" title="Reset to default">
                &#8634;
              </button>
            </div>
            <div class="yt-error-msg" id="lofi-error-msg">
              &#9888; Invalid YouTube URL
            </div>

            <!-- YouTube Embedded Video -->
            <div class="yt-embed-wrap" id="lofi-player-wrap">
              <iframe
                id="lofi-yt-player"
                src="https://www.youtube.com/embed/76GStMlLF_Y?autoplay=0&rel=0&modestbranding=1"
                frameborder="0"
                allow="autoplay; encrypted-media; fullscreen"
              ></iframe>
              <div class="yt-loading-overlay" id="lofi-loading">LOADING...</div>
            </div>

            <!-- YouTube Playback Controls -->
            <div class="yt-controls">
              <button class="yt-play-btn" onclick="toggleLofiPlay()">
                &#9654; Play
              </button>
              <div class="yt-volume">
                <span id="lofi-vol-icon">&#128264;</span>
                <input
                  type="range"
                  id="lofi-vol"
                  min="0"
                  max="100"
                  value="70"
                  oninput="lofiSetVolume(this.value)"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Navigation Links -->
        <div class="player-links">
          <a href="index.php" class="back-link">
            <i class="bi bi-arrow-left"></i> Home
          </a>
          <a href="logout.php" class="logout-link">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </div>
    </div>

    <!-- ====== STANDALONE TAB SWITCHING (Spotify / YouTube) ====== -->
    <script>
      function switchPlayerTab(tabName) {
        // Update tab buttons
        document
          .querySelectorAll(".player-tab")
          .forEach((t) => t.classList.remove("active"));
        const tabBtn = document.getElementById("sp-tab-" + tabName);
        if (tabBtn) tabBtn.classList.add("active");

        // Update panels — neither player is destroyed, just hidden
        document
          .querySelectorAll(".player-panel")
          .forEach((p) => p.classList.remove("active"));
        const panel = document.getElementById("sp-panel-" + tabName);
        if (panel) panel.classList.add("active");
      }

      // Flag so player.js knows this is the standalone page and user is logged in
      const PX_LOGGED_IN = true;
    </script>

    <!-- ====== MUSIC PLAYER CONTROLLERS ====== -->
    <script src="player.js"></script>
    <script src="youtube.js"></script>
  </body>
</html>
