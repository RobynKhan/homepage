<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <title>My Spotify Player</title>
    <link rel="stylesheet" href="styling.css" />
    <style>
      /* ── Player page overrides ─────────────────────────────── */
      body {
        align-items: center;
        justify-content: center;
      }

      .player-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 36px 32px;
        width: min(420px, 92vw);
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .player-container h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      #track-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      #album-art {
        width: 180px;
        height: 180px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        background: rgba(255, 255, 255, 0.05);
      }

      #track-name {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        color: var(--cream);
        letter-spacing: 0.3px;
      }

      #artist-name {
        margin: 0;
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      /* Progress bar */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .progress-row span {
        font-size: 11px;
        color: var(--text-muted);
        min-width: 34px;
        font-family: "Share Tech Mono", monospace;
      }

      #progress-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      /* Controls */
      .controls {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .controls button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--glass-border);
        background: transparent;
        color: var(--text-primary);
        border-radius: 50%;
        cursor: pointer;
        transition:
          background var(--transition),
          color var(--transition),
          transform var(--transition);
        padding: 0;
      }

      .controls button:hover {
        background: var(--glass-hover);
        color: var(--cream);
        border-color: var(--brown-light);
        transform: scale(1.1);
      }

      /* Prev / Next */
      .controls .btn-skip {
        width: 42px;
        height: 42px;
        font-size: 18px;
      }

      /* Play/Pause — larger */
      #play-btn {
        width: 56px;
        height: 56px;
        font-size: 24px;
        background: var(--brown-mid) !important;
        border-color: var(--brown-light) !important;
        color: var(--cream) !important;
        box-shadow: 0 4px 14px rgba(129, 50, 11, 0.4);
      }

      #play-btn:hover {
        background: var(--brown-light) !important;
        transform: scale(1.08) !important;
      }

      /* Volume row */
      .volume-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }

      .volume-row .bi {
        font-size: 16px;
        color: var(--text-muted);
      }

      #volume-bar {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 999px;
        background: var(--glass-border);
        outline: none;
        cursor: pointer;
        accent-color: var(--brown-light);
      }

      /* Back link */
      .back-link {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: color var(--transition);
      }

      .back-link:hover {
        color: var(--cream);
      }

      @media (max-width: 600px) {
        #album-art {
          width: 140px;
          height: 140px;
        }
      }
    </style>
  </head>
  <body>
    <div class="player-container">
      <h2>Now Playing</h2>

      <div id="track-info">
        <img id="album-art" src="" alt="Album Art" />
        <p id="track-name">Loading...</p>
        <p id="artist-name"></p>
      </div>

      <!-- Progress bar -->
      <div class="progress-row">
        <span id="current-time">0:00</span>
        <input type="range" id="progress-bar" value="0" min="0" max="100" />
        <span id="total-time">0:00</span>
      </div>

      <!-- Playback controls -->
      <div class="controls">
        <button
          class="btn-skip"
          onclick="previousTrack()"
          aria-label="Previous"
        >
          <i class="bi bi-skip-start-fill"></i>
        </button>
        <button id="play-btn" onclick="togglePlay()" aria-label="Play / Pause">
          <i class="bi bi-play-fill" id="play-icon"></i>
        </button>
        <button class="btn-skip" onclick="nextTrack()" aria-label="Next">
          <i class="bi bi-skip-end-fill"></i>
        </button>
      </div>

      <!-- Volume control -->
      <div class="volume-row">
        <i class="bi bi-volume-down"></i>
        <input type="range" id="volume-bar" value="100" min="0" max="100" />
        <i class="bi bi-volume-up"></i>
      </div>

      <a href="index.php" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to home
      </a>
    </div>

    <!-- Spotify Web Playback SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="player.js"></script>
  </body>
</html>
